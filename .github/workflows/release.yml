name: Release

on:
  milestone:
    types: [closed]
  workflow_dispatch:
    inputs:
      pg_version:
        description: "PostgreSQL version or branch to release (16, 17, 18, or an exact patch like 18.3)"
        required: true
      pg_bin_version:
        description: "Optional PostgreSQL Windows x64 binary version override (defaults to <pg_version>-1)"
        required: false
      postgis_version:
        description: "PostGIS version or branch to release (3.4, 3.5, 3.6, or an exact patch like 3.6.2)"
        required: false
        default: "3.6.2"
      include_windows_arm64:
        description: "Include the experimental Windows arm64 artifact and BOM entry"
        required: false
        type: boolean
        default: false
      windows_arm64_pg_version:
        description: "Optional PostgreSQL version or branch override for Windows arm64 when MSYS2 lags behind"
        required: false

permissions:
  contents: write

jobs:
  resolve-inputs:
    name: Resolve release inputs
    runs-on: ubuntu-latest
    outputs:
      postgres_version: ${{ steps.resolve.outputs.postgres_version }}
      postgis_version: ${{ steps.resolve.outputs.postgis_version }}
      release_version: ${{ steps.resolve.outputs.release_version }}
      windows_pg_bin_version: ${{ steps.resolve.outputs.windows_pg_bin_version }}
      include_windows_arm64: ${{ steps.resolve.outputs.include_windows_arm64 }}
      windows_arm64_pg_version: ${{ steps.resolve.outputs.windows_arm64_pg_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Resolve effective values
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MILESTONE_VERSION: ${{ github.event.milestone.title }}
          INPUT_PG_VERSION: ${{ inputs.pg_version }}
          INPUT_PG_BIN_VERSION: ${{ inputs.pg_bin_version }}
          INPUT_POSTGIS_VERSION: ${{ inputs.postgis_version }}
          INPUT_INCLUDE_WINDOWS_ARM64: ${{ inputs.include_windows_arm64 }}
          INPUT_WINDOWS_ARM64_PG_VERSION: ${{ inputs.windows_arm64_pg_version }}
        run: |
          extract_resolved_value() {
            local output=$1
            local key=$2
            printf '%s\n' "$output" | sed -n "s/^${key}=//p" | head -n1
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PG_VERSION_SPEC=$INPUT_PG_VERSION
            POSTGIS_VERSION_SPEC=${INPUT_POSTGIS_VERSION:-3.6.2}
            INCLUDE_WINDOWS_ARM64=${INPUT_INCLUDE_WINDOWS_ARM64:-false}
            WINDOWS_PG_BIN_SPEC=$INPUT_PG_BIN_VERSION
            WINDOWS_ARM64_SPEC=${INPUT_WINDOWS_ARM64_PG_VERSION:-$INPUT_PG_VERSION}
          else
            PG_VERSION_SPEC=${MILESTONE_VERSION%.*}
            POSTGIS_VERSION_SPEC=3.6.2
            INCLUDE_WINDOWS_ARM64=false
            WINDOWS_PG_BIN_SPEC=
            WINDOWS_ARM64_SPEC=$PG_VERSION_SPEC
          fi

          RESOLVED_OUTPUT=$(./gradlew -q --console=plain printResolvedVersions -PpgVersion="$PG_VERSION_SPEC" -PpostgisVersion="$POSTGIS_VERSION_SPEC" -PdistName=windows -ParchName=amd64)
          RESOLVED_PG_VERSION=$(extract_resolved_value "$RESOLVED_OUTPUT" resolved_pg_version)
          RESOLVED_POSTGIS_VERSION=$(extract_resolved_value "$RESOLVED_OUTPUT" resolved_postgis_version)

          echo "postgres_version=$RESOLVED_PG_VERSION" >> "$GITHUB_OUTPUT"
          echo "postgis_version=$RESOLVED_POSTGIS_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=${RESOLVED_PG_VERSION}-${RESOLVED_POSTGIS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "windows_pg_bin_version=${WINDOWS_PG_BIN_SPEC:-${RESOLVED_PG_VERSION}-1}" >> "$GITHUB_OUTPUT"
          echo "include_windows_arm64=$INCLUDE_WINDOWS_ARM64" >> "$GITHUB_OUTPUT"

          if [ "$INCLUDE_WINDOWS_ARM64" = "true" ]; then
            WINDOWS_ARM64_OUTPUT=$(./gradlew -q --console=plain printResolvedVersions -PpgVersion="$WINDOWS_ARM64_SPEC" -PpostgisVersion="$RESOLVED_POSTGIS_VERSION" -PdistName=windows -ParchName=arm64v8)
            RESOLVED_WINDOWS_ARM64_PG_VERSION=$(extract_resolved_value "$WINDOWS_ARM64_OUTPUT" resolved_pg_version)
            echo "windows_arm64_pg_version=$RESOLVED_WINDOWS_ARM64_PG_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "windows_arm64_pg_version=" >> "$GITHUB_OUTPUT"
          fi

  linux-amd64:
    name: Linux amd64
    needs: resolve-inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Build bundle
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.postgres_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
        run: ./gradlew :debian-platforms:buildAmd64DebianBundle -Pversion=$RELEASE_VERSION -PpgVersion=$POSTGRES_VERSION -PpostgisVersion=$POSTGIS_VERSION
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: amd64DebianBundle
          path: debian-platforms/build/tmp/buildAmd64DebianBundle/bundle/postgres-linux-debian.txz

  linux-arm64:
    name: Linux arm64
    needs: resolve-inputs
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Build bundle
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.postgres_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
        run: ./gradlew :debian-platforms:buildArm64v8DebianBundle -Pversion=$RELEASE_VERSION -PpgVersion=$POSTGRES_VERSION -PpostgisVersion=$POSTGIS_VERSION
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: arm64v8DebianBundle
          path: debian-platforms/build/tmp/buildArm64v8DebianBundle/bundle/postgres-linux-debian.txz

  alpine-amd64:
    name: Alpine amd64
    needs: resolve-inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Build bundle
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.postgres_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
        run: ./gradlew :alpine-platforms:buildAmd64AlpineBundle -Pversion=$RELEASE_VERSION -PpgVersion=$POSTGRES_VERSION -PpostgisVersion=$POSTGIS_VERSION
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: amd64AlpineBundle
          path: alpine-platforms/build/tmp/buildAmd64AlpineBundle/bundle/postgres-linux-alpine_linux.txz

  alpine-arm64:
    name: Alpine arm64
    needs: resolve-inputs
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Build bundle
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.postgres_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
        run: ./gradlew :alpine-platforms:buildArm64v8AlpineBundle -Pversion=$RELEASE_VERSION -PpgVersion=$POSTGRES_VERSION -PpostgisVersion=$POSTGIS_VERSION
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: arm64v8AlpineBundle
          path: alpine-platforms/build/tmp/buildArm64v8AlpineBundle/bundle/postgres-linux-alpine_linux.txz

  windows-amd64:
    name: Windows amd64
    needs: resolve-inputs
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Build and test bundle
        shell: bash
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.postgres_version }}
          POSTGRES_BIN_VERSION: ${{ needs.resolve-inputs.outputs.windows_pg_bin_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
        run: |
          ./gradlew :custom-windows-platform:testCustomWindowsJar \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpgBinVersion=$POSTGRES_BIN_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION \
            -PdistName=windows \
            -ParchName=amd64
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: windowsAmd64Bundle
          path: custom-windows-platform/build/tmp/buildCustomWindowsBundle/bundle/postgres-windows-x86_64.txz

  macos-arm64:
    name: macOS arm64
    needs: resolve-inputs
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Install psql executables
        run: |
          brew update
          brew install postgresql
          echo "$(brew --prefix postgresql)/bin" >> $GITHUB_PATH
      - name: Build and test bundle
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.postgres_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
        run: |
          ./gradlew :custom-darwin-platform:testCustomDarwinJar \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION \
            -PdistName=darwin \
            -ParchName=arm64v8
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: darwinArm64Bundle
          path: custom-darwin-platform/build/tmp/buildCustomDarwinBundle/bundle/postgres-darwin-arm_64.txz

  windows-arm64:
    name: Windows arm64
    needs: resolve-inputs
    if: ${{ needs.resolve-inputs.outputs.include_windows_arm64 == 'true' }}
    runs-on: windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Build and test bundle
        shell: bash
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.windows_arm64_pg_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.windows_arm64_pg_version }}-${{ needs.resolve-inputs.outputs.postgis_version }}
        run: |
          ./gradlew :custom-windows-platform:testCustomWindowsJar \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION \
            -PdistName=windows \
            -ParchName=arm64v8
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: windowsArm64Bundle
          path: custom-windows-platform/build/tmp/buildCustomWindowsBundle/bundle/postgres-windows-arm_64.txz

  publish-maven-central:
    name: Publish Maven Central
    needs:
      - resolve-inputs
      - linux-amd64
      - linux-arm64
      - alpine-amd64
      - alpine-arm64
      - windows-amd64
      - macos-arm64
      - windows-arm64
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    environment: mavenCentral
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USER }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASS }}
      ORG_GRADLE_PROJECT_mavenCentralNamespace: dev.tronto.postgis
      ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_CERT }}
      ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - name: Download Linux amd64 bundle
        uses: actions/download-artifact@v4
        with:
          name: amd64DebianBundle
          path: debian-platforms/build/tmp/buildAmd64DebianBundle/bundle
      - name: Download Linux arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: arm64v8DebianBundle
          path: debian-platforms/build/tmp/buildArm64v8DebianBundle/bundle
      - name: Download Alpine amd64 bundle
        uses: actions/download-artifact@v4
        with:
          name: amd64AlpineBundle
          path: alpine-platforms/build/tmp/buildAmd64AlpineBundle/bundle
      - name: Download Alpine arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: arm64v8AlpineBundle
          path: alpine-platforms/build/tmp/buildArm64v8AlpineBundle/bundle
      - name: Download Windows amd64 bundle
        uses: actions/download-artifact@v4
        with:
          name: windowsAmd64Bundle
          path: custom-windows-platform/build/tmp/buildCustomWindowsBundle/bundle
      - name: Download macOS arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: darwinArm64Bundle
          path: custom-darwin-platform/build/tmp/buildCustomDarwinBundle/bundle
      - name: Download Windows arm64 bundle
        if: ${{ needs.resolve-inputs.outputs.include_windows_arm64 == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: windowsArm64Bundle
          path: custom-windows-platform/build/tmp/buildCustomWindowsBundle/bundle
      - name: Set environment variables
        env:
          POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.postgres_version }}
          POSTGIS_VERSION: ${{ needs.resolve-inputs.outputs.postgis_version }}
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
          POSTGRES_BIN_VERSION: ${{ needs.resolve-inputs.outputs.windows_pg_bin_version }}
          INCLUDE_WINDOWS_ARM64: ${{ needs.resolve-inputs.outputs.include_windows_arm64 }}
          WINDOWS_ARM64_POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.windows_arm64_pg_version }}
        run: |
          echo "POSTGRES_VERSION=$POSTGRES_VERSION" >> $GITHUB_ENV
          echo "POSTGIS_VERSION=$POSTGIS_VERSION" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "POSTGRES_BIN_VERSION=$POSTGRES_BIN_VERSION" >> $GITHUB_ENV
          BOM_ARTIFACT_NAMES=embedded-postgres-binaries-linux-amd64,embedded-postgres-binaries-linux-arm64v8,embedded-postgres-binaries-linux-amd64-alpine,embedded-postgres-binaries-linux-arm64v8-alpine,embedded-postgres-binaries-windows-amd64,embedded-postgres-binaries-darwin-arm64v8
          if [ "$INCLUDE_WINDOWS_ARM64" = "true" ]; then
            BOM_ARTIFACT_NAMES=$BOM_ARTIFACT_NAMES,embedded-postgres-binaries-windows-arm64v8
            if [ "$WINDOWS_ARM64_POSTGRES_VERSION" != "$POSTGRES_VERSION" ]; then
              echo "BOM_ARTIFACT_VERSION_OVERRIDES=embedded-postgres-binaries-windows-arm64v8=${WINDOWS_ARM64_POSTGRES_VERSION}-${POSTGIS_VERSION}" >> $GITHUB_ENV
            fi
          fi
          echo "BOM_ARTIFACT_NAMES=$BOM_ARTIFACT_NAMES" >> $GITHUB_ENV
      - name: Validate Maven Central publish configuration
        run: |
          ./gradlew --no-daemon checkMavenCentralPublishing \
            -PpublishTarget=mavenCentral \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION
      - name: Publish Linux and Alpine artifacts
        run: |
          ./gradlew --no-daemon --stacktrace \
            :debian-platforms:publishAmd64DebianPublicationToMavenCentralRepository \
            :debian-platforms:publishArm64v8DebianPublicationToMavenCentralRepository \
            :alpine-platforms:publishAmd64AlpinePublicationToMavenCentralRepository \
            :alpine-platforms:publishArm64v8AlpinePublicationToMavenCentralRepository \
            -x buildAmd64DebianBundle \
            -x buildArm64v8DebianBundle \
            -x buildAmd64AlpineBundle \
            -x buildArm64v8AlpineBundle \
            -PpublishTarget=mavenCentral \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION
      - name: Publish Windows amd64 artifact
        run: |
          ./gradlew --no-daemon --stacktrace \
            :custom-windows-platform:publishCustomWindowsPublicationToMavenCentralRepository \
            -x buildCustomWindowsBundle \
            -PpublishTarget=mavenCentral \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpgBinVersion=$POSTGRES_BIN_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION \
            -PdistName=windows \
            -ParchName=amd64
      - name: Publish macOS arm64 artifacts
        run: |
          ./gradlew --no-daemon --stacktrace \
            :custom-darwin-platform:publishCustomDarwinPublicationToMavenCentralRepository \
            :custom-darwin-platform:publishCompatDarwinAmd64PublicationToMavenCentralRepository \
            -x buildCustomDarwinBundle \
            -PpublishTarget=mavenCentral \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION \
            -PdistName=darwin \
            -ParchName=arm64v8
      - name: Publish Windows arm64 artifact
        if: ${{ needs.resolve-inputs.outputs.include_windows_arm64 == 'true' }}
        env:
          WINDOWS_ARM64_POSTGRES_VERSION: ${{ needs.resolve-inputs.outputs.windows_arm64_pg_version }}
        run: |
          ./gradlew --no-daemon --stacktrace \
            :custom-windows-platform:publishCustomWindowsPublicationToMavenCentralRepository \
            -x buildCustomWindowsBundle \
            -PpublishTarget=mavenCentral \
            -Pversion=${WINDOWS_ARM64_POSTGRES_VERSION}-${POSTGIS_VERSION} \
            -PpgVersion=$WINDOWS_ARM64_POSTGRES_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION \
            -PdistName=windows \
            -ParchName=arm64v8
      - name: Publish BOM
        run: |
          ./gradlew --no-daemon --stacktrace \
            :publishBomPublicationToMavenCentralRepository \
            -PpublishTarget=mavenCentral \
            -PbomArtifactNames=$BOM_ARTIFACT_NAMES \
            ${BOM_ARTIFACT_VERSION_OVERRIDES:+-PbomArtifactVersionOverrides=$BOM_ARTIFACT_VERSION_OVERRIDES} \
            -Pversion=$RELEASE_VERSION \
            -PpgVersion=$POSTGRES_VERSION \
            -PpostgisVersion=$POSTGIS_VERSION
      - name: Summarize next steps
        env:
          RELEASE_VERSION: ${{ needs.resolve-inputs.outputs.release_version }}
        run: |
          {
            echo "## Maven Central release upload complete"
            echo
            echo "Uploaded signed release artifacts for \`$RELEASE_VERSION\`."
            echo
            echo "Manual next steps:"
            echo "1. Open https://central.sonatype.com/publishing/deployments"
            echo "2. Inspect the uploaded deployment under namespace \`dev.tronto.postgis\`"
            echo "3. Publish/release it manually from the Central UI"
            echo "4. Create the Git tag only after Central publication looks correct"
          } >> "$GITHUB_STEP_SUMMARY"
