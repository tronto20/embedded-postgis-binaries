import org.gradle.internal.os.OperatingSystem

plugins {
    id "de.undercouch.download" version "4.1.1"
}

def versionIndexCache = [:]

def normalizeVersionSpec = { String spec ->
    def value = (spec ?: '').trim()
    value.endsWith('.x') ? value[0..-3] : value
}

def versionComponents = { String version ->
    version.tokenize('.').collect { it.toInteger() }
}

def compareVersionComponents = { List<Integer> left, List<Integer> right ->
    def maxSize = Math.max(left.size(), right.size())
    for (int i = 0; i < maxSize; i++) {
        def leftValue = i < left.size() ? left[i] : 0
        def rightValue = i < right.size() ? right[i] : 0
        if (leftValue != rightValue) {
            return leftValue <=> rightValue
        }
    }
    0
}

def fetchIndexedVersions = { String cacheKey, String url, regex ->
    if (versionIndexCache.containsKey(cacheKey)) {
        return versionIndexCache[cacheKey]
    }

    def connection = new URL(url).openConnection()
    connection.setConnectTimeout(30000)
    connection.setReadTimeout(30000)
    connection.setRequestProperty('User-Agent', 'embedded-postgres-binaries-version-resolver/1.0')
    def html = connection.inputStream.getText('UTF-8')
    def versions = ((html =~ regex).collect { it[1] } as Set).toList().sort { left, right ->
        compareVersionComponents(versionComponents(right), versionComponents(left))
    }
    versionIndexCache[cacheKey] = versions
    versions
}

def fetchWindowsAmd64PostgisVersions = { int pgMajor ->
    def cacheKey = "windows-amd64-postgis-${pgMajor}"
    if (versionIndexCache.containsKey(cacheKey)) {
        return versionIndexCache[cacheKey]
    }

    def regex = java.util.regex.Pattern.compile("postgis-bundle-pg${pgMajor}-(\\d+\\.\\d+\\.\\d+)x64\\.zip")
    def versions = (
            fetchIndexedVersions("${cacheKey}-current", "https://download.osgeo.org/postgis/windows/pg${pgMajor}/", regex) +
                    fetchIndexedVersions("${cacheKey}-archive", "https://download.osgeo.org/postgis/windows/pg${pgMajor}/archive/", regex)
    ).toSet().toList().sort { left, right ->
        compareVersionComponents(versionComponents(right), versionComponents(left))
    }

    versionIndexCache[cacheKey] = versions
    versions
}

def resolvePostgresVersionSpec = { String requestedSpec, boolean windowsArm64 = false ->
    def spec = normalizeVersionSpec(requestedSpec)
    if (!spec) {
        return spec
    }
    if (spec ==~ /^\d+\.\d+$/) {
        return spec
    }
    if (!(spec ==~ /^\d+$/)) {
        throw new GradleException("PostgreSQL versions must be a major branch like '17' or an exact patch release like '17.9'")
    }
    if (gradle.startParameter.offline) {
        throw new GradleException("Cannot resolve the PostgreSQL branch '$requestedSpec' in offline mode; specify an exact patch release instead")
    }

    def versions = windowsArm64
            ? fetchIndexedVersions(
                    'windows-arm64-postgres',
                    'https://mirror.msys2.org/mingw/clangarm64/',
                    /mingw-w64-clang-aarch64-postgresql(?:-\d+)?-(\d+\.\d+)-\d+-any\.pkg\.tar\.zst/)
            : fetchIndexedVersions(
                    'postgres',
                    'https://ftp.postgresql.org/pub/source/',
                    /href="v(\d+\.\d+)\/"/)

    def resolved = versions.find { it.startsWith("${spec}.") }
    if (!resolved) {
        throw new GradleException("Unable to resolve the latest PostgreSQL patch release for branch '$requestedSpec'")
    }
    resolved
}

def resolvePostgisVersionSpec = { String requestedSpec, boolean windowsArm64 = false ->
    def spec = normalizeVersionSpec(requestedSpec)
    if (!spec) {
        return spec
    }
    if (spec ==~ /^\d+\.\d+\.\d+$/) {
        return spec
    }
    if (!(spec ==~ /^\d+\.\d+$/)) {
        throw new GradleException("PostGIS versions must be a release branch like '3.6' or an exact patch release like '3.6.2'")
    }
    if (gradle.startParameter.offline) {
        throw new GradleException("Cannot resolve the PostGIS branch '$requestedSpec' in offline mode; specify an exact patch release instead")
    }

    def versions = windowsArm64
            ? fetchIndexedVersions(
                    'windows-arm64-postgis',
                    'https://mirror.msys2.org/mingw/clangarm64/',
                    /mingw-w64-clang-aarch64-postgis-(\d+\.\d+\.\d+)-\d+-any\.pkg\.tar\.zst/)
            : fetchIndexedVersions(
                    'postgis',
                    'https://postgis.net/stuff/',
                    /href="postgis-(\d+\.\d+\.\d+)\.tar\.gz"/)

    def resolved = versions.find { it.startsWith("${spec}.") }
    if (!resolved) {
        throw new GradleException("Unable to resolve the latest PostGIS patch release for branch '$requestedSpec'")
    }
    resolved
}

def resolveWindowsAmd64PostgisVersionSpec = { String requestedSpec, int pgMajor ->
    def spec = normalizeVersionSpec(requestedSpec)
    if (!spec) {
        return spec
    }

    if (gradle.startParameter.offline) {
        if (spec ==~ /^\d+\.\d+\.\d+$/) {
            return spec
        }
        throw new GradleException("Cannot resolve the Windows amd64 PostGIS branch '$requestedSpec' in offline mode; specify an exact patch release instead")
    }

    def versions = fetchWindowsAmd64PostgisVersions(pgMajor)
    if (spec ==~ /^\d+\.\d+\.\d+$/) {
        if (!versions.contains(spec)) {
            throw new GradleException("PostGIS ${spec} is not published for Windows amd64 PostgreSQL ${pgMajor}; available versions are ${versions.join(', ')}")
        }
        return spec
    }
    if (!(spec ==~ /^\d+\.\d+$/)) {
        throw new GradleException("PostGIS versions must be a release branch like '3.6' or an exact patch release like '3.6.2'")
    }

    def resolved = versions.find { it.startsWith("${spec}.") }
    if (!resolved) {
        throw new GradleException("No Windows amd64 PostGIS bundle matching branch '$requestedSpec' is published for PostgreSQL ${pgMajor}; available versions are ${versions.join(', ')}")
    }
    resolved
}

ext {
    requestedVersionParam = gradle.startParameter.projectProperties['version']
    ossrhUsername = project.findProperty('ossrh.username')
    ossrhPassword = project.findProperty('ossrh.password')
    publishTargetParam = project.findProperty('publishTarget') ?: 'ossrh'
    githubPackagesUrl = project.findProperty('githubPackagesUrl')
    githubPackagesUsername = project.findProperty('githubPackagesUsername') ?: System.getenv('GITHUB_ACTOR')
    githubPackagesPassword = project.findProperty('githubPackagesPassword') ?: System.getenv('GITHUB_TOKEN')
    bomArtifactNamesParam = ((project.findProperty('bomArtifactNames') ?: '') as String)
            .split(',')
            .collect { it.trim() }
            .findAll { it }
    bomArtifactVersionOverridesParam = ((project.findProperty('bomArtifactVersionOverrides') ?: '') as String)
            .split(',')
            .collect { it.trim() }
            .findAll { it }
            .collectEntries { entry ->
                def delimiter = entry.indexOf('=')
                if (delimiter <= 0 || delimiter == entry.length() - 1) {
                    throw new GradleException("The 'bomArtifactVersionOverrides' property must use artifactId=version entries")
                }
                [(entry.substring(0, delimiter)) : entry.substring(delimiter + 1)]
            }

    requestedPgVersionParam = project.findProperty('pgVersion') ?: ''
    requestedPostgisVersionParam = project.findProperty('postgisVersion') ?: '3.6.2'
    distNameParam = project.findProperty('distName') ?: ''
    archNameParam = project.findProperty('archName') ?: ''
    windowsTargetParam = distNameParam == 'windows'
    windowsArm64TargetParam = windowsTargetParam && archNameParam == 'arm64v8'
    windowsAmd64TargetParam = windowsTargetParam && archNameParam != 'arm64v8'
    pgVersionParam = resolvePostgresVersionSpec(requestedPgVersionParam as String, windowsArm64TargetParam)
    pgBinVersionParam = project.findProperty('pgBinVersion') ?: (pgVersionParam ? "${pgVersionParam}-1" : '')
    pgMajorVersionParam = (pgVersionParam =~ /(\d+).+/).with { matches() ? it[0][1].toInteger() : null }
    postgisVersionParam = windowsAmd64TargetParam
            ? resolveWindowsAmd64PostgisVersionSpec(requestedPostgisVersionParam as String, pgMajorVersionParam)
            : resolvePostgisVersionSpec(requestedPostgisVersionParam as String, windowsArm64TargetParam)
    postgisVersionMatcher = postgisVersionParam =~ /^(\d+)\.(\d+)(?:\.(\d+))?$/
    postgisMajorVersionParam = postgisVersionMatcher.matches() ? postgisVersionMatcher[0][1].toInteger() : null
    postgisMinorVersionParam = postgisVersionMatcher.matches() ? postgisVersionMatcher[0][2].toInteger() : null
    artifactVersionParam = requestedVersionParam ?: (pgVersionParam ? "${pgVersionParam}-${postgisVersionParam}" : null)
    dockerImageParam = project.findProperty('dockerImage') ?: ''
    qemuPathParam = project.findProperty('qemuPath') ?: ''
}

version = artifactVersionParam ?: version

allprojects {
    apply plugin: 'java'
    apply plugin: 'maven-publish'
    apply plugin: 'signing'

    group = 'io.zonky.test.postgres'
    version = rootProject.version

    base {
        archivesName = 'embedded-postgres-binaries'
    }

    java {
        sourceCompatibility = JavaVersion.VERSION_1_6
        targetCompatibility = JavaVersion.VERSION_1_6
    }

    repositories {
        mavenCentral()
    }

    configurations {
        bundles
    }
}

task validateInputs {
    doFirst {
        println "version:       ${project.version}"
        println "requestedPgVersion: ${requestedPgVersionParam}"
        println "pgVersion:     $pgVersionParam"
        println "pgBinVersion:  $pgBinVersionParam"
        println "requestedPostgisVersion: ${requestedPostgisVersionParam}"
        println "postgisVersion: $postgisVersionParam"

        if (!pgVersionParam) {
            throw new GradleException("The 'pgVersion' property must be set")
        }
        if (!project.version || project.version == 'unspecified') {
            throw new GradleException("The artifact version could not be resolved")
        }
        if (requestedVersionParam?.contains('-postgis-')) {
            throw new GradleException("Use the '<pgVersion>-<postgisVersion>' artifact version format instead of '-postgis-'")
        }
        if (!pgMajorVersionParam || pgMajorVersionParam < 16 || pgMajorVersionParam > 18) {
            throw new GradleException("This repository currently supports PostgreSQL 16, 17, and 18")
        }
        if (!postgisMajorVersionParam || postgisMajorVersionParam != 3 || !(postgisMinorVersionParam in [4, 5, 6])) {
            throw new GradleException("This repository currently supports PostGIS 3.4.x, 3.5.x, and 3.6.x")
        }
        if (project.findProperty('defaultPostgisVersion') != null) {
            throw new GradleException("PostGIS is always enabled; use the 'postgisVersion' property to override the bundled version")
        }
        if (project.findProperty('disablePostgis') != null) {
            throw new GradleException("PostGIS is always enabled; the 'disablePostgis' property is no longer supported")
        }
        if (!['ossrh', 'githubPackages'].contains(publishTargetParam)) {
            throw new GradleException("The 'publishTarget' property must be either 'ossrh' or 'githubPackages'")
        }
        if (publishTargetParam == 'githubPackages' && !githubPackagesUrl) {
            throw new GradleException("The 'githubPackagesUrl' property must be set when publishTarget=githubPackages")
        }
        if (bomArtifactVersionOverridesParam.keySet().any { !bomArtifactNamesParam.contains(it) }) {
            throw new GradleException("Every entry in 'bomArtifactVersionOverrides' must also be present in 'bomArtifactNames'")
        }
        if (distNameParam && !['alpine', 'darwin', 'windows'].contains(distNameParam)) {
            throw new GradleException("Currently only the 'alpine', 'darwin', and 'windows' distributions are supported")
        }
        if (archNameParam && !(archNameParam ==~ /^[a-z0-9]+$/)) {
            throw new GradleException("The 'archName' property must contain only alphanumeric characters")
        }
        if (['darwin', 'windows'].contains(distNameParam) && !postgisVersionParam) {
            throw new GradleException("The 'postgisVersion' property must be set when building the '${distNameParam}' distribution")
        }
        if (distNameParam == 'darwin' && archNameParam && archNameParam != 'arm64v8') {
            throw new GradleException("The 'darwin' distribution currently supports only the 'arm64v8' architecture")
        }
        if (distNameParam == 'windows' && archNameParam && !['amd64', 'arm64v8'].contains(archNameParam)) {
            throw new GradleException("The 'windows' distribution currently supports only the 'amd64' and 'arm64v8' architectures")
        }
        if (distNameParam == 'darwin') {
            def system = OperatingSystem.current()
            if (!system.isMacOsX() || normalizeArchName(system.getArch()) != 'arm_64') {
                throw new GradleException("The 'darwin' distribution currently requires an Apple Silicon macOS host")
            }
        }
    }
}

task printResolvedVersions {
    doLast {
        println "resolved_requested_pg_version=${requestedPgVersionParam}"
        println "resolved_pg_version=${pgVersionParam}"
        println "resolved_pg_bin_version=${pgBinVersionParam}"
        println "resolved_requested_postgis_version=${requestedPostgisVersionParam}"
        println "resolved_postgis_version=${postgisVersionParam}"
        println "resolved_artifact_version=${project.version}"
    }
}

task downloadQemuExecutables(type: Download, dependsOn: validateInputs) {
    onlyIfModified true
    onlyIf { !qemuPathParam && OperatingSystem.current().isLinux() && OperatingSystem.current().getArch() == 'amd64' }
    src(['arm', 'aarch64', 'ppc64le'].collect { arch ->
        "https://github.com/multiarch/qemu-user-static/releases/download/v2.12.0/qemu-$arch-static"
    })
    overwrite false
    dest file("$temporaryDir/downloads")
}

task prepareQemuExecutables(type: Copy, dependsOn: downloadQemuExecutables) {
    from downloadQemuExecutables.dest
    into file("$temporaryDir/executables")
    doLast {
        fileTree(dir: destinationDir).files.each { file ->
            file.setExecutable(true, false)
        }
    }
}

