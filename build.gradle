publishing {
    publications {
        if (!distNameParam && !archNameParam && !dockerImageParam) {
            bom(MavenPublication) {
                artifactId = 'embedded-postgres-binaries-bom'
                configurePom(pom, artifactId, 'Bill of Materials')

                pom.withXml {
                    def root = asNode()
                    root.children().last() + {
                        resolveStrategy = Closure.DELEGATE_FIRST

                        dependencyManagement {
                            dependencies {
                                resolveBomDependencies().each { archive ->
                                    dependency {
                                        groupId "${project.group}"
                                        artifactId "${archive.artifactId}"
                                        version "${archive.version}"

                                        if (!archive.artifactId.contains('amd64') || archive.artifactId.contains('lite')) {
                                            optional = 'true'
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}

allprojects {

    publishing {
        repositories {
            if (publishTargetParam == 'githubPackages') {
                maven {
                    name = 'githubPackages'
                    url = uri(githubPackagesUrl)
                    credentials {
                        username = githubPackagesUsername
                        password = githubPackagesPassword
                    }
                }
            } else {
                maven {
                    def releasesRepoUrl = "https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/"
                    def snapshotsRepoUrl = "https://central.sonatype.com/repository/maven-snapshots/"
                    url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
                    credentials {
                        username = ossrhUsername
                        password = ossrhPassword
                    }
                }
            }
        }
    }

    signing {
        required = { publishTargetParam == 'ossrh' && gradle.taskGraph.hasTask("publish") }

        if (publishTargetParam == 'ossrh') {
            def signingKey = findProperty("signingKey")
            def signingKeyId = findProperty("signingKeyId")
            def signingPassword = findProperty("signingPassword")
            useInMemoryPgpKeys(signingKeyId, signingKey, signingPassword)

            publishing.publications.all { publication ->
                sign publication
            }
        }
    }

    task install(group: 'publishing') {}

    configurations.bundles.artifacts.all { archive ->
        def publicationName = archive.archiveTask.name - 'Jar'

        jar.dependsOn "${archive.archiveTask.name}"
        test.dependsOn "test${archive.archiveTask.name.capitalize()}"
        install.dependsOn "publish${publicationName.capitalize()}PublicationToMavenLocal"
    }

    task uploadArchives(group: 'publishing') {
        dependsOn publish
    }

    tasks.whenTaskAdded { task ->
        if (task.name == 'publishBomPublicationToMavenLocal') {
            install.dependsOn task
        }
    }
}

def configurePom(pom, artifact, desc) {
    pom.withXml {
        def root = asNode()

        root.children().last() + {
            resolveStrategy = Closure.DELEGATE_FIRST

            name artifact
            description desc
            url 'https://github.com/zonkyio/embedded-postgres-binaries'

            scm {
                connection 'scm:git:git://github.com/zonkyio/embedded-postgres-binaries.git'
                developerConnection 'scm:git:ssh://github.com:zonkyio/embedded-postgres-binaries.git'
                url 'https://github.com/zonkyio/embedded-postgres-binaries/tree/master'
            }

            licenses {
                license {
                    name 'The Apache License, Version 2.0'
                    url 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                }
            }

            developers {
                developer {
                    name 'Tomas Vanek'
                    email 'tomix26@gmail.com'
                }
                developer {
                    name 'Zonky Developers'
                    email 'developers@zonky.cz'
                }
            }
        }
    }
}

def resolveBomDependencies() {
    def dependencies = bomArtifactNamesParam ?
            bomArtifactNamesParam.collect { artifactId ->
                [artifactId: artifactId, version: bomArtifactVersionOverridesParam[artifactId] ?: project.version.toString()]
            } :
            project.subprojects.collectMany { subproject ->
                subproject.configurations.bundles.artifacts.collect { archive ->
                    [artifactId: archive.name, version: project.version.toString()]
                }
            }

    return dependencies.sort { dependency ->
        dependency.artifactId.replaceFirst(/^embedded-postgres-binaries-([^-]+-([^-]+).*)$/, { all, suffix, arch ->
            ['amd64', 'i386'].indexOf(arch).with { it != -1 ? it : 9 } + suffix
        })
    }
}

def resolveQemuBindings() {
    def bindings = fileTree(dir:"${qemuPathParam ? qemuPathParam : '/usr/bin'}", includes:['qemu-*-static']).getFiles()
    if (!bindings && !qemuPathParam) {
        bindings = fileTree(dir: prepareQemuExecutables.destinationDir, includes:['qemu-*-static']).getFiles()
    }
    return bindings.collect { "-v ${it.path}:/usr/bin/${it.name}" }.join(' ')
}

static def defaultDebianImage(archName, useEmulation) {
    def system = OperatingSystem.current()

    if (archName == system.getArch()) {
        return 'ubuntu:18.04'
    } else if (system.isMacOsX() || useEmulation) {
        return "$archName/ubuntu:18.04"
    } else if (system.isLinux()) {
        def archMappings = ['arm32v6':'armel', 'arm32v7':'armhf', 'arm64v8':'arm64', 'ppc64le':'ppc64el']
        return "multiarch/ubuntu-core:${archMappings[archName] ?: archName}-bionic"
    } else {
        throw new GradleException("Cross-building is not supported on the current platform: $system")
    }
}

static def defaultAlpineImage(archName, useEmulation) {
    def system = OperatingSystem.current()

    if (archName == system.getArch()) {
        return 'alpine:3.9'
    } else if (system.isMacOsX() || useEmulation) {
        return "$archName/alpine:3.9"
    } else if (system.isLinux()) {
        def archMappings = ['arm32v5':'armel', 'arm32v6':'armhf', 'arm64v8':'arm64']
        return "multiarch/alpine:${archMappings[archName] ?: archName}-v3.9"
    } else {
        throw new GradleException("Cross-building is not supported on the current platform: $system")
    }
}

static def normalizeArchName(String input) {
    String arch = input.toLowerCase(Locale.US).replaceAll('[^a-z0-9]+', '')

    if (arch ==~ /^(x8664|amd64|ia32e|em64t|x64)$/) {
        return 'x86_64'
    }
    if (arch ==~ /^(x8632|x86|i[3-6]86|ia32|x32)$/) {
        return 'x86_32'
    }
    if (arch ==~ /^(ia64w?|itanium64)$/) {
        return 'itanium_64'
    }
    if (arch == 'ia64n') {
        return 'itanium_32'
    }
    if (arch ==~ /^(sparcv9|sparc64)$/) {
        return 'sparc_64'
    }
    if (arch ==~ /^(sparc|sparc32)$/) {
        return 'sparc_32'
    }
    if (arch ==~ /^(aarch64|armv8|arm64).*$/) {
        return 'arm_64'
    }
    if (arch ==~ /^(arm|arm32).*$/) {
        return 'arm_32'
    }
    if (arch ==~ /^(mips|mips32)$/) {
        return 'mips_32'
    }
    if (arch ==~ /^(mipsel|mips32el)$/) {
        return 'mipsel_32'
    }
    if (arch == 'mips64') {
        return 'mips_64'
    }
    if (arch == 'mips64el') {
        return 'mipsel_64'
    }
    if (arch ==~ /^(ppc|ppc32)$/) {
        return 'ppc_32'
    }
    if (arch ==~ /^(ppcle|ppc32le)$/) {
        return 'ppcle_32'
    }
    if (arch == 'ppc64') {
        return 'ppc_64'
    }
    if (arch == 'ppc64le') {
        return 'ppcle_64'
    }
    if (arch == 's390') {
        return 's390_32'
    }
    if (arch == 's390x') {
        return 's390_64'
    }

    throw new GradleException("Unsupported architecture: $arch")
}

def configureLazyCommandLine(Exec task, Object... arguments) {
    task.doFirst {
        task.commandLine(*arguments.collect { argument ->
            argument instanceof Closure ? argument() : argument
        })
    }
}

def resolveWindowsBashExecutable() {
    if (!OperatingSystem.current().isWindows()) {
        return 'bash'
    }

    // Windows also ships a System32 bash.exe that launches WSL, which fails on
    // GitHub Actions runners without an installed distro. Prefer Git Bash.
    def candidatePaths = []
    [System.getenv('ProgramFiles'), System.getenv('ProgramFiles(x86)')].findAll { it }.each { base ->
        candidatePaths += [
                new File(base, 'Git/bin/bash.exe'),
                new File(base, 'Git/usr/bin/bash.exe')
        ]
    }

    (System.getenv('PATH') ?: '').split(File.pathSeparator).findAll { it }.each { dir ->
        candidatePaths << new File(dir, 'bash.exe')
    }

    for (candidate in candidatePaths) {
        def normalizedPath = candidate.absolutePath.replace('\\', '/').toLowerCase()
        if (normalizedPath.endsWith('/windows/system32/bash.exe')) {
            continue
        }
        if (candidate.exists()) {
            return candidate.absolutePath
        }
    }

    throw new GradleException("Unable to locate Git Bash on Windows; install Git for Windows or add bash.exe to PATH")
}
